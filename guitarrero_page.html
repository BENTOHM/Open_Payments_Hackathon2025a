<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - El Guitarrero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Updated styling to match main page aesthetic */
        body { 
            font-family: 'Montserrat', sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            color: #2d3748;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .cause { 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px; 
            margin-bottom: 30px; 
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .cause h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        .cause p {
            margin-bottom: 25px;
        }
        
        input, select, button { 
            padding: 16px; 
            font-size: 16px; 
            margin: 8px;
            border-radius: 12px;
            border: 2px solid rgba(78, 205, 196, 0.3);
            font-family: 'Montserrat', sans-serif;
        }
        
        input, select {
            background-color: rgba(255, 255, 255, 0.9);
            color: #2d3748;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }
        
        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: #ffffff;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 50px;
            padding: 16px 32px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }
        
        #payment-info { 
            margin-top: 30px; 
            background: rgba(78, 205, 196, 0.1);
            padding: 25px; 
            border-radius: 15px;
            border-left: 4px solid #4ecdc4;
            text-align: left;
        }
        
        #payment-info h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
        }
        
        #payment-info p {
            color: #f7fafc;
            margin-bottom: 10px;
        }
        
        #payment-info strong {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>Nexus</h1>
    <p>¡Apoya a los creadores y causas de tu comunidad de forma fácil y directa!</p>

    <div class="cause">
        <h2>🎸 Artista Urbano: El Guitarrero</h2>
        <p>Alegra las calles del centro con su música. ¡Apóyalo con una propina!</p>
        
        <div>
            <input type="number" id="amount-input" placeholder="Monto (ej. 5)" min="1" step="any">
            <select id="currency-input">
                <option value="USD">USD</option>
                <option value="MXN">MXN</option>
                <option value="EUR">EUR</option>
                <option value="BTC">BTC</option>
                <option value="ETH">ETH</option>
            </select>
        </div>
        <button id="support-button">¡Apoyar Ahora!</button>
    </div>

    <div id="payment-info">
        <p>Aquí aparecerán las instrucciones para completar tu apoyo.</p>
    </div>

    <script src="main.js"></script>
</body>
</html>
